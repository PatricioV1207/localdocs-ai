name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: ""
        run: python -m pytest

      - name: Compile Python modules
        run: python -m compileall -q app.py localdocs tests scripts

      - name: Run quality evaluations
        env:
          OPENAI_API_KEY: ""
        run: python scripts/run_quality_eval.py
